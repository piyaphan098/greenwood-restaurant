<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenwood — สั่งอาหาร</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Josefin+Sans:wght@300;400;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --ink  : #0a0f0b;
      --pine : #0f2114;
      --moss : #1c3d24;
      --gold : #b8953a;
      --gilt : #d4af5a;
      --cream: #f0e9d6;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Josefin Sans','Sarabun',sans-serif;background:var(--ink);color:var(--cream);min-height:100dvh;overflow-x:hidden;padding-bottom:120px}

    /* HEADER */
    .hd{background:var(--pine);border-bottom:1px solid rgba(184,149,58,.2);padding:1.2rem 1.5rem 1rem;position:sticky;top:0;z-index:100}
    .hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    .hd-brand{display:flex;align-items:center;gap:.6rem}
    .hd-logo{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.85rem;color:var(--gold);font-weight:700}
    .hd-title{font-size:.6rem;letter-spacing:.3em;color:rgba(240,233,214,.5);font-weight:600}
    .hd-sub{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-top:.1rem}
    .cart-btn{background:var(--gold);color:var(--ink);border:none;border-radius:50px;padding:.5rem 1.1rem;font-family:'Josefin Sans',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.12em;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:background .2s}
    .cart-btn:hover{background:var(--gilt)}
    .cart-count{background:var(--ink);color:var(--gilt);border-radius:50%;width:18px;height:18px;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center}

    /* SEARCH */
    .search-wrap{position:relative}
    .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:rgba(240,233,214,.35);pointer-events:none;font-size:.85rem}
    .search-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(184,149,58,.2);border-radius:50px;padding:.7rem 2.6rem;color:var(--cream);font-family:'Josefin Sans','Sarabun',sans-serif;font-size:.82rem;font-weight:300;outline:none;transition:border-color .2s}
    .search-input::placeholder{color:rgba(240,233,214,.35)}
    .search-input:focus{border-color:rgba(184,149,58,.55)}
    .search-clear{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(240,233,214,.4);font-size:1rem;cursor:pointer;display:none}
    .search-clear.show{display:block}

    /* TABS */
    .tabs-wrap{padding:1rem 1.5rem 0;overflow-x:auto;scrollbar-width:none}
    .tabs-wrap::-webkit-scrollbar{display:none}
    .tabs{display:flex;gap:.5rem}
    .tab{flex:1;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(184,149,58,.18);border-radius:50px;padding:.6rem 1rem;font-size:.72rem;letter-spacing:.12em;font-weight:600;color:rgba(240,233,214,.55);cursor:pointer;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

    /* SECTION LABEL */
    .sec-wrap{padding:1.5rem 1rem 0}
    .sec-header{display:flex;align-items:center;gap:.8rem;margin-bottom:.3rem}
    .sec-header::before{content:'';flex:0 0 20px;height:1px;background:var(--gold)}
    .sec-header span{font-size:.6rem;letter-spacing:.35em;color:var(--gilt);font-weight:600}
    .sec-price{font-size:.72rem;color:rgba(240,233,214,.4);letter-spacing:.15em;padding:0 0 .8rem 28px}

    /* SET CARDS GRID */
    .set-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:0}

    .set-card{background:rgba(255,255,255,.04);border:1px solid rgba(184,149,58,.12);border-radius:12px;overflow:hidden;transition:border-color .2s,background .2s;position:relative;cursor:pointer}
    .set-card:hover{border-color:rgba(184,149,58,.35);background:rgba(255,255,255,.07)}
    .set-card.in-cart{border-color:var(--gold)}

    /* SET CARD HEADER */
    .set-card-hd{background:rgba(184,149,58,.12);padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(184,149,58,.1)}
    .set-code{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gilt);font-weight:700}
    .set-pax{font-size:.58rem;letter-spacing:.1em;color:rgba(240,233,214,.4)}

    /* SET CARD BODY — รายการอาหาร */
    .set-card-body{padding:.65rem .8rem}
    .set-item-list{list-style:none;margin-bottom:.65rem}
    .set-item-list li{font-family:'Sarabun',sans-serif;font-size:.72rem;font-weight:400;color:rgba(240,233,214,.65);line-height:1.7;display:flex;align-items:baseline;gap:.35rem}
    .set-item-list li::before{content:'·';color:var(--gold);flex-shrink:0}

    /* SET CARD FOOTER */
    .set-card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:.5rem;border-top:1px solid rgba(184,149,58,.08)}
    .set-price{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gilt)}
    .set-price small{font-size:.6rem;font-family:'Josefin Sans',sans-serif;color:rgba(212,175,90,.6)}

    .add-btn{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--ink);border:none;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s;flex-shrink:0}
    .add-btn:hover{background:var(--gilt)}
    .add-btn:active{transform:scale(.88)}
    .qty-ctrl{display:flex;align-items:center;gap:.35rem;flex-shrink:0}
    .qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid rgba(184,149,58,.4);background:rgba(184,149,58,.1);color:var(--gilt);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
    .qty-btn:hover{background:rgba(184,149,58,.25)}
    .qty-num{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--cream);min-width:16px;text-align:center}

    /* BUFFET CARDS — full width */
    .buf-card{background:rgba(255,255,255,.04);border:1px solid rgba(184,149,58,.12);border-radius:12px;overflow:hidden;margin-bottom:.75rem;cursor:pointer;transition:border-color .2s,background .2s}
    .buf-card:hover{border-color:rgba(184,149,58,.35);background:rgba(255,255,255,.07)}
    .buf-card.in-cart{border-color:var(--gold)}
    .buf-card-hd{background:rgba(184,149,58,.12);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(184,149,58,.1)}
    .buf-code{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gilt);font-weight:700}
    .buf-card-body{padding:.75rem 1rem}
    .buf-item-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:.1rem .5rem;margin-bottom:.75rem}
    .buf-item-list li{font-family:'Sarabun',sans-serif;font-size:.72rem;color:rgba(240,233,214,.65);line-height:1.7;display:flex;align-items:baseline;gap:.3rem}
    .buf-item-list li::before{content:'·';color:var(--gold);flex-shrink:0}
    .buf-card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:.6rem;border-top:1px solid rgba(184,149,58,.08)}
    .buf-price{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gilt)}
    .buf-price small{font-size:.6rem;font-family:'Josefin Sans',sans-serif;color:rgba(212,175,90,.6)}
    .buf-note{font-size:.65rem;color:rgba(240,233,214,.35);letter-spacing:.05em}

    /* NO RESULT */
    .no-result{text-align:center;padding:3rem 1.5rem;display:none}
    .no-result p{color:rgba(240,233,214,.35);font-size:.8rem;letter-spacing:.1em}

    /* DRAWER */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
    .overlay.show{opacity:1;pointer-events:all}
    .drawer{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--pine);border-top:1px solid rgba(184,149,58,.25);border-radius:20px 20px 0 0;max-height:80dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
    .drawer.show{transform:translateY(0)}
    .drawer-handle{width:36px;height:4px;background:rgba(240,233,214,.2);border-radius:2px;margin:.8rem auto 0}
    .drawer-hd{padding:1rem 1.5rem;border-bottom:1px solid rgba(184,149,58,.12);display:flex;align-items:center;justify-content:space-between}
    .drawer-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream)}
    .drawer-close{background:none;border:none;color:rgba(240,233,214,.4);font-size:1.2rem;cursor:pointer}
    .cart-list{flex:1;overflow-y:auto;padding:.5rem 1.5rem}
    .cart-item{display:flex;align-items:center;gap:.8rem;padding:.9rem 0;border-bottom:1px solid rgba(184,149,58,.08)}
    .cart-item-info{flex:1}
    .cart-item-name{font-family:'Sarabun',sans-serif;font-size:.85rem;color:var(--cream)}
    .cart-item-sub{font-family:'Sarabun',sans-serif;font-size:.7rem;color:rgba(240,233,214,.4);margin-top:.15rem}
    .cart-item-qty{display:flex;align-items:center;gap:.5rem}
    .ciq-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(184,149,58,.3);background:transparent;color:var(--gilt);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .ciq-num{font-size:.85rem;min-width:18px;text-align:center;color:var(--cream)}
    .cart-item-price{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--gilt);min-width:65px;text-align:right}
    .cart-empty{text-align:center;padding:2.5rem;color:rgba(240,233,214,.3);font-size:.8rem;letter-spacing:.1em}
    .drawer-ft{padding:1rem 1.5rem 1.5rem;border-top:1px solid rgba(184,149,58,.12)}
    .total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
    .total-lbl{font-size:.65rem;letter-spacing:.25em;color:rgba(240,233,214,.45);font-weight:600}
    .total-amt{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gilt)}
    .total-amt small{font-size:.75rem;font-family:'Josefin Sans',sans-serif}
    .confirm-btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:50px;padding:.95rem;font-family:'Josefin Sans',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.2em;cursor:pointer;transition:background .2s}
    .confirm-btn:hover{background:var(--gilt)}
    .confirm-btn:disabled{background:rgba(184,149,58,.3);color:rgba(240,233,214,.3);cursor:not-allowed}

    /* FLOAT CART */
    .float-cart{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);border-radius:50px;padding:.8rem 1.5rem;display:none;align-items:center;gap:.8rem;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.15em;box-shadow:0 4px 24px rgba(0,0,0,.4);cursor:pointer;z-index:150;animation:floatUp .3s ease;white-space:nowrap}
    .float-cart.show{display:flex}
    @keyframes floatUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
    .float-count{background:var(--ink);color:var(--gilt);border-radius:50%;width:22px;height:22px;font-size:.65rem;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>

<header class="hd">
  <div class="hd-top">
    <div class="hd-brand">
      <div class="hd-logo">G</div>
      <div>
        <div class="hd-title">GREENWOOD GOLF CLUB</div>
        <div class="hd-sub">Restaurant</div>
      </div>
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 ตะกร้า <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" placeholder="ค้นหาเมนูอาหาร..." id="searchInput" oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</header>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div id="menuSections"></div>
<div class="no-result" id="noResult"><p>ไม่พบเมนูที่ค้นหา</p></div>

<div class="float-cart" id="floatCart" onclick="openCart()">
  <span class="float-count" id="floatCount">0</span>
  ดูตะกร้าสินค้า
  <span id="floatTotal">฿0</span>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-hd">
    <div class="drawer-title">รายการสั่งอาหาร</div>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="drawer-ft">
    <div class="total-row">
      <span class="total-lbl">ยอดรวมทั้งหมด</span>
      <span class="total-amt"><small>฿</small><span id="totalAmt">0</span></span>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmOrder()" disabled>
      ยืนยันรายการ — ส่งกลับไลน์
    </button>
  </div>
</div>

      { id:"B350-3", name:"บุฟเฟ่ต์ ชุดที่ 3", dishes:["ไก่ทอดกรอบคาราเกะ","ผัดเปรี้ยวหวานไก่","กระหล่ำปลีผัดไข่","กระเพาะปลาผัดแห้ง","ยำวุ้นเส้นหมูสับ","ต้มยำปีกไก่บ้าน","ข้าวสวย","ผลไม้"] },
      { id:"B350-4", name:"บุฟเฟ่ต์ ชุดที่ 4", dishes:["เฟร้นฟราย","ยำวุ้นเส้นหมูสับ","ไก่ผัดเม็ดมะม่วง","ปลาหมึกผัดผงกะหรี่","ผัดผักรวมมิตร","ต้มยำขาหมู","ข้าวสวย","ผลไม้"] },

      { id:"B350-6", name:"บุฟเฟ่ต์ ชุดที่ 6", dishes:["ไก่ทอดกรอบคาราเกะ","ผัดเปรี้ยวหวานไก่","กระหล่ำปลีผัดไข่","กระเพาะปลาผัดแห้ง","ยำวุ้นเส้นหมูสับ","ต้มยำปีกไก่บ้าน","ข้าวสวย","ผลไม้"] },
    ]
  },
];

let cart = {};
let activeCategory = "ทั้งหมด";

function buildTabs() {
  const cats = ["ทั้งหมด", ...MENU.map(c => c.category)];
  document.getElementById("tabs").innerHTML = cats.map(c =>
    `<button class="tab ${c===activeCategory?"active":""}" onclick="selectTab('${c}')">${c}</button>`
  ).join("");
}

function buildMenu(filter="") {
  const q = filter.trim().toLowerCase();
  let html = "";
  let total = 0;

  MENU.forEach(sec => {
    if (activeCategory !== "ทั้งหมด" && sec.category !== activeCategory) return;
    const items = sec.items.filter(item =>
      !q || item.name.toLowerCase().includes(q) ||
      item.dishes.some(d => d.toLowerCase().includes(q))
    );
    if (!items.length) return;
    total += items.length;

    html += `<div class="sec-wrap">
      <div class="sec-header"><span>${sec.type==="set"?"🍱":"🥘"} ${sec.category.toUpperCase()}</span></div>
      <div class="sec-price">${sec.priceLabel}${sec.note ? " · "+sec.note : ""}</div>`;

    if (sec.type === "set") {
      html += `<div class="set-grid">`;
      items.forEach(item => { html += buildSetCard(item, sec.price); });
      html += `</div>`;
    } else {
      items.forEach(item => { html += buildBufCard(item, sec.price, sec.note||""); });
    }
    html += `</div>`;
  });

  document.getElementById("menuSections").innerHTML = html;
  document.getElementById("noResult").style.display = total===0 ? "block" : "none";
}

function buildSetCard(item, price) {
  const qty = cart[item.id] || 0;
  const ctrl = qty > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty('${item.id}',-1,event)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="chQty('${item.id}',1,event)" style="background:rgba(184,149,58,.25);border-color:var(--gold)">＋</button>
       </div>`
    : `<button class="add-btn" onclick="chQty('${item.id}',1,event)">＋</button>`;
  return `
    <div class="set-card ${qty>0?'in-cart':''}" onclick="chQty('${item.id}',1,event)">
      <div class="set-card-hd">
        <span class="set-code">${item.id}</span>
        <span class="set-pax">4 คน / เซ็ท</span>
      </div>
      <div class="set-card-body">
        <ul class="set-item-list">
          ${item.dishes.map(d=>`<li>${d}</li>`).join("")}
        </ul>
        <div class="set-card-ft">
          <div class="set-price"><small>฿</small>${price.toLocaleString()}</div>
          ${ctrl}
        </div>
      </div>
    </div>`;
}

function buildBufCard(item, price, note) {
  const qty = cart[item.id] || 0;
  const ctrl = qty > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty('${item.id}',-1,event)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="chQty('${item.id}',1,event)" style="background:rgba(184,149,58,.25);border-color:var(--gold)">＋</button>
       </div>`
    : `<button class="add-btn" onclick="chQty('${item.id}',1,event)">＋</button>`;
  return `
    <div class="buf-card ${qty>0?'in-cart':''}">
      <div class="buf-card-hd">
        <span class="buf-code">${item.name}</span>
      </div>
      <div class="buf-card-body">
        <ul class="buf-item-list">
          ${item.dishes.map(d=>`<li>${d}</li>`).join("")}
        </ul>
        <div class="buf-card-ft">
          <div>
            <div class="buf-price"><small>฿</small>${price} / คน</div>
            ${note?`<div class="buf-note">${note}</div>`:""}
          </div>
          ${ctrl}
        </div>
      </div>
    </div>`;
}

function selectTab(cat) {
  activeCategory = cat;
  buildTabs();
  buildMenu(document.getElementById("searchInput").value);
  window.scrollTo({top:0,behavior:"smooth"});
}

function onSearch(val) {
  document.getElementById("searchClear").classList.toggle("show", val.length>0);
  buildMenu(val);
}
function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").classList.remove("show");
  buildMenu("");
}

function chQty(id, delta, e) {
  e && e.stopPropagation();
  cart[id] = Math.max(0, (cart[id]||0) + delta);
  if (cart[id]===0) delete cart[id];
  updateCartUI();
  buildMenu(document.getElementById("searchInput").value);
}

function updateCartUI() {
  const entries = Object.entries(cart);
  const allItems = MENU.flatMap(s=>s.items.map(i=>({...i, price: MENU.find(s2=>s2.items.includes(i)).price})));
  const totalQty = entries.reduce((s,[,q])=>s+q, 0);
  const totalAmt = entries.reduce((s,[id,q])=>{ const i=allItems.find(x=>x.id===id); return s+(i?i.price*q:0); }, 0);
  document.getElementById("cartCount").textContent = totalQty;
  document.getElementById("totalAmt").textContent = totalAmt.toLocaleString();
  document.getElementById("floatCount").textContent = totalQty;
  document.getElementById("floatTotal").textContent = `฿${totalAmt.toLocaleString()}`;
  document.getElementById("floatCart").classList.toggle("show", totalQty>0);
  document.getElementById("confirmBtn").disabled = totalQty===0;
}

function openCart() {
  document.getElementById("overlay").classList.add("show");
  document.getElementById("drawer").classList.add("show");
  renderCartList();
}
function closeCart() {
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("drawer").classList.remove("show");
}

function renderCartList() {
  const list = document.getElementById("cartList");
  const entries = Object.entries(cart);
  const allItems = MENU.flatMap(s=>s.items.map(i=>({...i, price:MENU.find(s2=>s2.items.includes(i)).price, priceLabel:MENU.find(s2=>s2.items.includes(i)).priceLabel})));
  if (!entries.length) { list.innerHTML=`<div class="cart-empty">ยังไม่มีรายการ</div>`; return; }
  list.innerHTML = entries.map(([id,qty])=>{
    const item = allItems.find(x=>x.id===id);
    if (!item) return "";
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-sub">${item.priceLabel}</div>
      </div>
      <div class="cart-item-qty">
        <button class="ciq-btn" onclick="chQty('${id}',-1,event);renderCartList()">−</button>
        <span class="ciq-num">${qty}</span>
        <button class="ciq-btn" onclick="chQty('${id}',1,event);renderCartList()">+</button>
      </div>
      <div class="cart-item-price">฿${(item.price*qty).toLocaleString()}</div>
    </div>`;
  }).join("");
}

async function confirmOrder() {
  const entries = Object.entries(cart);
  const allItems = MENU.flatMap(s=>s.items.map(i=>({...i,price:MENU.find(s2=>s2.items.includes(i)).price})));
  const totalAmt = entries.reduce((s,[id,q])=>{ const i=allItems.find(x=>x.id===id); return s+(i?i.price*q:0); },0);
  const lines = entries.map(([id,q])=>{ const i=allItems.find(x=>x.id===id); return i?`${i.name} x${q} = ฿${(i.price*q).toLocaleString()}`:""; }).filter(Boolean);
  const now = new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
  const flexMsg = {
    type:"flex", altText:`🍽️ รายการอาหาร — ฿${totalAmt.toLocaleString()}`,
    contents:{
      type:"bubble",size:"kilo",
      header:{type:"box",layout:"vertical",backgroundColor:"#0f2114",paddingAll:"16px",contents:[
        {type:"text",text:"GREENWOOD GOLF CLUB",size:"xs",color:"#b8953a",weight:"bold",letterSpacing:"3px"},
        {type:"text",text:"รายการสั่งอาหาร",size:"lg",color:"#f0e9d6",weight:"bold",margin:"sm"}
      ]},
      body:{type:"box",layout:"vertical",paddingAll:"16px",spacing:"sm",contents:[
        ...lines.map(l=>({type:"box",layout:"horizontal",contents:[{type:"text",text:l,size:"sm",color:"#f0e9d6",wrap:true,flex:1}]})),
        {type:"separator",margin:"md"},
        {type:"box",layout:"horizontal",margin:"md",contents:[
          {type:"text",text:"ยอดรวม",weight:"bold",color:"#f0e9d6",size:"md"},
          {type:"text",text:`฿${totalAmt.toLocaleString()}`,weight:"bold",color:"#d4af5a",size:"md",align:"end"}
        ]},
        {type:"text",text:`เวลาสั่ง ${now}`,size:"xxs",color:"#888",margin:"sm"}
      ]}
    }
  };
  try {
    await liff.init({liffId:LIFF_ID});
    if (liff.isInClient()) { await liff.sendMessages([flexMsg]); liff.closeWindow(); }
    else showSummary(lines,totalAmt,now);
  } catch { showSummary(lines,totalAmt,now); }
}

function showSummary(lines,total,time) {
  closeCart();
  alert(`✅ รายการสั่งอาหาร\n\n${lines.join("\n")}\n\n💰 รวม ฿${total.toLocaleString()}\n🕐 ${time}\n\n(ในระบบจริงจะส่งกลับไลน์อัตโนมัติ)`);
}

buildTabs();
buildMenu();
</script>
